# JobRadar 配置

# 搜索关键词
keywords:
  - AI Agent
  - Python
  - 大模型
  - AI
  - 人工智能
  - LLM
  - Agent
  - 自动化
  - 爬虫

# 目标城市
cities:
  - 北京
  - 上海
  - 深圳
  - 广州
  - 杭州

# 薪资范围 (单位：k) - 顶层格式，匹配 main.py
salary_min: 15
salary_max: 40

# 猎聘网 Cookie (可选，本地测试用)
# GitHub 环境请使用 Secrets: LIEPIN_COOKIE
liepin_cookie: ""

# 推送设置
push:
  enabled: true
  channel: feishu

# 去重设置
dedup:
  enabled: true
  cache_file: jobs_cache.json
  expire_hours: 24
